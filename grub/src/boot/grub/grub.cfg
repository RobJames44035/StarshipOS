# GRUB Configuration file

# Set the default boot entry to the first entry in the menu
set default=0

# Set the timeout before the default boot entry is selected
set timeout=5

menuentry "Starship" {
set root=(cd)
linux /boot/starship root=/dev/ram0 rw console=ttyS0,115200 loglevel=7 earlyprintk=serial,ttyS0,115200 debug initcall_debug ignore_loglevel
initrd /boot/initramfs.img
}
