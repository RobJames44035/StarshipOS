# paste -> JTextComponent.pasteAction

editLabel=編集
cutLabel=切取り
cutImage=resources/cut.gif
copyLabel=コピー
copyImage=resources/copy.gif
pasteLabel=貼付け
pasteImage=resources/paste.gif
undoLabel=元に戻す
redoLabel=再実行

#
# debug Menu definition
#

debugLabel=デバッグ
dumpLabel=モデルをSystem.errにダンプ
showElementTreeLabel=要素の表示

