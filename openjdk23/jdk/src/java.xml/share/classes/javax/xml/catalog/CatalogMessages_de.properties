# General errors
BadMessageKey = JAXP09000001: Die zum Meldungsschlüssel gehörige Fehlermeldung kann nicht gefunden werden.
FormatFailed = JAXP09000002: Beim Formatieren der folgenden Meldung ist ein interner Fehler aufgetreten:\n
OtherError = JAXP09000003: Unerwarteter Fehler.

# Implementation restriction
CircularReference = JAXP09010001: Zirkelbezug ist nicht zulässig: "{0}".

# Input or configuration errors
# Technical term, do not translate: catalog
InvalidCatalog = JAXP09020001: Das Dokumentelement eines Katalogs muss ein Katalog sein.
InvalidEntryType = JAXP09020002: Der Eintragstyp "{0}" ist nicht gültig.
UriNotAbsolute = JAXP09020003: Die angegebene URI "{0}" ist nicht absolut.
UriNotValidUrl = JAXP09020004: Die angegebene URI "{0}" ist keine gültige URL.
InvalidArgument = JAXP09020005: Das angegebene Argument "{0}" (unter Beachtung der Groß-/Kleinschreibung) für "{1}" ist nicht gültig.
NullArgument = JAXP09020006: Das Argument "{0}" darf nicht null sein.
InvalidPath = JAXP09020007: Der Pfad "{0}" ist ungültig.


# Parsing errors
ParserConf = JAXP09030001: Unerwarteter Fehler bei der Konfiguration eines SAX-Parsers.
# Technical term, do not translate: catalog
ParsingFailed = JAXP09030002: Die Katalogdatei konnte nicht geparst werden.
# Technical term, do not translate: catalog
NoCatalogFound = JAXP09030003: Kein Katalog angegeben.


# Resolving errors
NoMatchFound = JAXP09040001: Keine Übereinstimmung für publicId "{0}" und systemId "{1}" gefunden.
# Technical term, do not translate: href, base
NoMatchURIFound = JAXP09040002: Keine Übereinstimmung für href "{0}" und base "{1}" gefunden.
# Technical term, do not translate: href, base
FailedCreatingURI = JAXP09040003: URI kann nicht mit href "{0}" und base "{1}" erstellt werden.

