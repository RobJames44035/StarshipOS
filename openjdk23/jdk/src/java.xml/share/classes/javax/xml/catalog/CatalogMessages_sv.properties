# General errors
BadMessageKey = JAXP09000001: Det felmeddelande som motsvarar meddelandenyckeln kan inte hittas.
FormatFailed = JAXP09000002: Ett internt fel inträffade vid formatering av följande meddelande:\n
OtherError = JAXP09000003: Oväntat fel.

# Implementation restriction
CircularReference = JAXP09010001: Cirkelreferens är inte tillåten: ''{0}''.

# Input or configuration errors
# Technical term, do not translate: catalog
InvalidCatalog = JAXP09020001: Dokumentelementet för en katalog måste vara "catalog".
InvalidEntryType = JAXP09020002: Posttypen ''{0}'' är inte giltig.
UriNotAbsolute = JAXP09020003: Den angivna URI:n, ''{0}'', är inte absolut.
UriNotValidUrl = JAXP09020004: Den angivna URI:n, ''{0}'', är inte en giltig URL.
InvalidArgument = JAXP09020005: Det angivna argumentet, ''{0}'' (skiftlägeskänsligt), för ''{1}'' är inte giltigt.
NullArgument = JAXP09020006: Argumentet ''{0}'' kan inte vara null.
InvalidPath = JAXP09020007: Sökvägen ''{0}'' är ogiltig.


# Parsing errors
ParserConf = JAXP09030001: Oväntat fel vid konfiguration av en SAX-parser.
# Technical term, do not translate: catalog
ParsingFailed = JAXP09030002: Kunde inte tolka filen katalog.
# Technical term, do not translate: catalog
NoCatalogFound = JAXP09030003: Ingen katalog har angetts.


# Resolving errors
NoMatchFound = JAXP09040001: Ingen matchning hittades för publicId = ''{0}'' och systemId = ''{1}''.
# Technical term, do not translate: href, base
NoMatchURIFound = JAXP09040002: Ingen matchning hittades för href = ''{0}'' och bas = ''{1}''.
# Technical term, do not translate: href, base
FailedCreatingURI = JAXP09040003: Kan inte skapa URI med href = ''{0}'' och bas = ''{1}''.

