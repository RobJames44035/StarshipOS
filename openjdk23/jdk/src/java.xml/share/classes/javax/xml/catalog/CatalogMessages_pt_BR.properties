# General errors
BadMessageKey = JAXP09000001: Não foi possível encontrar a mensagem de erro correspondente à chave da mensagem.
FormatFailed = JAXP09000002: Ocorreu um erro interno ao formatar a mensagem a seguir:\n
OtherError = JAXP09000003: Erro inesperado.

# Implementation restriction
CircularReference = JAXP09010001: A referência circular não é permitida: ''{0}''.

# Input or configuration errors
# Technical term, do not translate: catalog
InvalidCatalog = JAXP09020001: O elemento de documento de um catálogo deve ser "catalog".
InvalidEntryType = JAXP09020002: O tipo de entrada "{0}" não é válido.
UriNotAbsolute = JAXP09020003: O URI especificado ''{0}'' não é absoluto.
UriNotValidUrl = JAXP09020004: O URI especificado ''{0}'' não é um URL válido.
InvalidArgument = JAXP09020005: O argumento especificado ''{0}'' (distingue maiúsculas de minúsculas) para ''{1}'' não é válido.
NullArgument = JAXP09020006: O argumento ''{0}'' não pode ser nulo.
InvalidPath = JAXP09020007: O caminho ''{0}'' é inválido.


# Parsing errors
ParserConf = JAXP09030001: Erro inesperado ao configurar um parser SAX.
# Technical term, do not translate: catalog
ParsingFailed = JAXP09030002: Falha ao fazer parsing do arquivo de catálogo.
# Technical term, do not translate: catalog
NoCatalogFound = JAXP09030003: Nenhum catálogo foi especificado.


# Resolving errors
NoMatchFound = JAXP09040001: Nenhuma correspondência foi encontrada para publicId ''{0}'' e systemId ''{1}''.
# Technical term, do not translate: href, base
NoMatchURIFound = JAXP09040002: Nenhuma correspondência foi encontrada para href ''{0}'' e base ''{1}''.
# Technical term, do not translate: href, base
FailedCreatingURI = JAXP09040003: Não é possível construir o URI usando href ''{0}'' e base ''{1}''.

