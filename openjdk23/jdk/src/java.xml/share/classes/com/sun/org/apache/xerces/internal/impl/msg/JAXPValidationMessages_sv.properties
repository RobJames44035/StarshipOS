# This file stores localized messages for the Xerces JAXP Validation API implementation.
#
# The messages are arranged in key and value tuples in a ListResourceBundle.

# Messages for message reporting
BadMessageKey = Hittar inte felmeddelandet som motsvarar meddelandenyckeln.
FormatFailed = Ett internt fel inträffade vid formatering av följande meddelande:\n

# SchemaFactory error messages
SchemaLanguageNull = Angivet schemaspråk får inte vara null.
SchemaLanguageLengthZero = Angivet schemaspråk får inte ha en längd som är noll tecken.
SchemaSourceArrayNull = Parametern för Source-uppställning får inte vara null.
SchemaSourceArrayMemberNull = Parametern för Source-uppställning får inte innehålla några objekt som är null.
SchemaFactorySourceUnrecognized = Source-parametrar av typ ''{0}'' identifieras inte av SchemaFactory.

# Validator error messages
SourceParameterNull = Source-parameter får inte vara null.
SourceNotAccepted = Source-parametrar av typ ''{0}'' accepteras inte av valideraren.
SourceResultMismatch = Source-parametrar av typ ''{0}'' är inte kompatibla med resultatparametrar av typ ''{1}''.

# TypeInfoProvider error messages
TypeInfoProviderIllegalState = TypeInfoProvider får inte ta emot frågor utanför respons från startElement.

# General error messages
FeatureNameNull = Funktionsnamn får inte vara null.
ProperyNameNull = Egenskapsnamn får inte vara null.
SAXSourceNullInputSource = Angiven SAXSource innehåller ingen InputSource.

