BadMessageKey = Hittar inte felmeddelandet som motsvarar meddelandenyckeln.
FormatFailed = Ett internt fel inträffade vid formatering av följande meddelande:\n

FieldCannotBeNull={0} kan inte anropas med null-parameter.
UnknownField={0} anropades med okänt fält:{1}
#There are two similar keys 'InvalidXMLGreogorianCalendarValue' . Suffix (year, month) has been added and are used as per the context.
InvalidXGCValue-milli=År = {0}, månad = {1}, dag = {2}, timme = {3}, minut = {4}, sekund = {5}, bråkdelssekund = {6}, tidszon = {7} är ogiltigt värde för gregoriansk kalender i XML.
#There are two similar keys 'InvalidXMLGreogorianCalendarValue' . Suffix (year, month) has been added and are used as per the context.
InvalidXGCValue-fractional=År = {0}, månad = {1}, dag = {2}, timme = {3}, minut = {4}, sekund = {5}, bråkdelssekund = {6}, tidszon = {7} är ogiltigt värde för gregoriansk kalender i XML.

InvalidXGCFields=Ogiltig uppsättning med fält angivet i XMLGregorianCalendar

InvalidFractional=Ogiltigt värde {0} angivet för bråkdelssekund.

#XGC stands for XML Gregorian Calendar
InvalidXGCRepresentation="{0}" är ogiltigt värde för gregoriansk kalender i XML.

InvalidFieldValue={0} är ett ogiltigt värde i fältet {1}.

NegativeField= Fältet {0} är negativt

AllFieldsNull=Alla fält (javax.xml.datatype.DatatypeConstants.Field) är null.

