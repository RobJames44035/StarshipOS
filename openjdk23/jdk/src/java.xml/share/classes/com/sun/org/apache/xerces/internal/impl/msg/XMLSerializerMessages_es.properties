# This file stores error messages for the Xerces XML
# serializer.  Many DOM Load/Save error messages also
# live here, since the serializer largely implements that package.
#
# As usual with properties files, the messages are arranged in
# key/value tuples.

    BadMessageKey = No se ha encontrado el mensaje de error que corresponde a la clave de mensaje.
    FormatFailed = Se ha producido un error interno al formatear el siguiente mensaje:\n

    ArgumentIsNull = El argumento ''{0}'' es nulo.
    NoWriterSupplied = No se ha suministrado ningún escritor para el serializador.
    MethodNotSupported = El método ''{0}'' no está soportado por esta fábrica.
    ResetInMiddle = No puede reiniciarse el serializador en medio de la serialización.
    Internal = Error interno: el estado del elemento es cero.
    NoName = No hay ningún rawName y localName es nulo.
    ElementQName = El nombre del elemento ''{0}'' no es un QName.
    ElementPrefix = El elemento ''{0}'' no pertenece a ningún espacio de nombres: el prefijo puede ser no declarado o estar enlazado a algún espacio de nombres.
    AttributeQName = El nombre del atributo ''{0}'' no es un QName.
    AttributePrefix = El atributo ''{0}'' no pertenece a ningún espacio de nombres: el prefijo puede ser no declarado o estar enlazado a algún espacio de nombres.
    InvalidNSDecl = La sintaxis de la declaración de espacio de nombres no es correcta: {0}.
    EndingCDATA = La secuencia de caracteres "]]>" no debe aparecer en el contenido a menos que se utilice para marcar el final de una sección CDATA.
    SplittingCDATA = División de una sección CDATA que contiene el marcador de terminación de sección CDATA "]]>".
    ResourceNotFound = No se ha encontrado el recurso ''{0}''.
    ResourceNotLoaded = No se ha podido cargar el recurso ''{0}''. {1}
    SerializationStopped =  La serialización se ha parado a petición del usuario.

    # DOM Level 3 load and save messages
    no-output-specified = no-output-specified: El destino de salida en el que se debían escribir los datos era nulo.
    unsupported-encoding = unsupported-encoding: Se ha encontrado una codificación no soportada.
    unable-to-serialize-node = unable-to-serialize-node: El nodo no se ha podido serializar.
