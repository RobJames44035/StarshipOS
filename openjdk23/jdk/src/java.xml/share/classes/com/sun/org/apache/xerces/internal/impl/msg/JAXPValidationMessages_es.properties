# This file stores localized messages for the Xerces JAXP Validation API implementation.
#
# The messages are arranged in key and value tuples in a ListResourceBundle.

# Messages for message reporting
BadMessageKey = No se ha encontrado el mensaje de error correspondiente a la clave de mensaje.
FormatFailed = Se ha producido un error interno al formatear el siguiente mensaje:\n

# SchemaFactory error messages
SchemaLanguageNull = El idioma del esquema especificado no puede ser nulo.
SchemaLanguageLengthZero = El idioma del esquema especificado no puede tener una longitud de cero caracteres.
SchemaSourceArrayNull = El parámetro de matriz de origen no puede ser nulo.
SchemaSourceArrayMemberNull = El parámetro de matriz de origen no puede contener ningún elemento que sea nulo.
SchemaFactorySourceUnrecognized = Este SchemaFactory no reconoce el parámetro de origen del tipo ''{0}''.

# Validator error messages
SourceParameterNull = El parámetro de origen no puede ser nulo.
SourceNotAccepted = Este validador no acepta el parámetro de origen del tipo ''{0}''.
SourceResultMismatch = El parámetro de origen del tipo ''{0}'' no es compatible con el parámetro de resultado del tipo ''{1}''.

# TypeInfoProvider error messages
TypeInfoProviderIllegalState = Un TypeInfoProvider no puede consultarse fuera de una devolución de llamada de startElement.

# General error messages
FeatureNameNull = El nombre de la función no puede ser nulo.
ProperyNameNull = El nombre de la propiedad no puede ser nulo.
SAXSourceNullInputSource = El SAXSource especificado no contiene ningún valor de InputSource.

