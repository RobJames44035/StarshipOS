# This file stores error messages for the Xerces XML
# serializer.  Many DOM Load/Save error messages also
# live here, since the serializer largely implements that package.
#
# As usual with properties files, the messages are arranged in
# key/value tuples.

    BadMessageKey = Hittar inte felmeddelandet som motsvarar meddelandenyckeln.
    FormatFailed = Ett internt fel inträffade vid formatering av följande meddelande:\n

    ArgumentIsNull = Argumentet ''{0}'' är null.
    NoWriterSupplied = Det finns ingen skrivare för serializer.
    MethodNotSupported = Metoden ''{0}'' stöds inte i denna fabriksinställning.
    ResetInMiddle = Serializer kan inte återställas under pågående serialisering.
    Internal = Internt fel: elementtillstånd är noll.
    NoName = Det finns inget rawName och localName är null.
    ElementQName = Elementnamnet ''{0}'' är inte något QName.
    ElementPrefix = Elementet ''{0}'' tillhör inte någon namnrymd: prefixet kanske inte har deklarerats eller är bundet till annan namnrymd.
    AttributeQName = Attributnamnet ''{0}'' är inte något QName.
    AttributePrefix = Attributet ''{0}'' tillhör inte någon namnrymd: prefixet kanske inte har deklarerats eller är bundet till annan namnrymd.
    InvalidNSDecl = Felaktig syntax i deklaration av namnrymd: {0}.
    EndingCDATA = Teckensekvensen "]]>" får inte förekomma i innehållet, såvida det inte används för att markera slut av CDATA-sektion.
    SplittingCDATA = Delar en CDATA-sektion som innehåller CDATA-sektionens avslutningsmarkör "]]>".
    ResourceNotFound = Resursen ''{0}'' hittades inte.
    ResourceNotLoaded = Resursen ''{0}'' kunde inte laddas. {1}
    SerializationStopped =  Serialiseringen stoppades vid användarbegäran.

    # DOM Level 3 load and save messages
    no-output-specified = no-output-specified: Utdatadestinationen som data ska skrivas till är null.
    unsupported-encoding = unsupported-encoding: En kodning som inte stöds påträffades.
    unable-to-serialize-node = unable-to-serialize-node: Noden kunde inte serialiseras.
