# This file stores error messages for the Xerces XML
# serializer.  Many DOM Load/Save error messages also
# live here, since the serializer largely implements that package.
#
# As usual with properties files, the messages are arranged in
# key/value tuples.

    BadMessageKey = Le message d'erreur correspondant à la clé de message est introuvable.
    FormatFailed = Une erreur interne est survenue lors de la mise en forme du message suivant :\n

    ArgumentIsNull = L''argument ''{0}'' est NULL.
    NoWriterSupplied = Aucun processus d'écriture n'est fourni pour le serializer.
    MethodNotSupported = La méthode ''{0}'' n''est pas prise en charge par cette fabrique.
    ResetInMiddle = Impossible de réinitialiser le serializer au cours de la sérialisation.
    Internal = Erreur interne : l'état de l'élément est zéro.
    NoName = Il n'existe aucun élément rawName et l'élément localName est NULL.
    ElementQName = Le nom d''élément ''{0}'' n''est pas un QName.
    ElementPrefix = L''élément ''{0}'' n''appartient à aucun espace de noms : le préfixe est peut-être non déclaré ou lié à un espace de noms.
    AttributeQName = Le nom d''attribut ''{0}'' n''est pas un QName.
    AttributePrefix = L''attribut ''{0}'' n''appartient à aucun espace de noms : le préfixe est peut-être non déclaré ou lié à un espace de noms.
    InvalidNSDecl = La syntaxe de la déclaration d''espace de noms est incorrecte : {0}.
    EndingCDATA = La séquence de caractères "]]>" ne peut figurer dans le contenu que pour marquer la fin de la section CDATA.
    SplittingCDATA = Fractionnement d'une section CDATA contenant le marqueur de fin de section CDATA "]]>".
    ResourceNotFound = La ressource ''{0}'' est introuvable.
    ResourceNotLoaded = La ressource ''{0}'' n''a pas pu être chargée. {1}
    SerializationStopped =  La sérialisation a été arrêtée à la demande de l'utilisateur.

    # DOM Level 3 load and save messages
    no-output-specified = pas de sortie indiquée : la destination de sortie dans laquelle écrire les données est NULL.
    unsupported-encoding = encodage non pris en charge : un encodage non pris en charge a été détecté.
    unable-to-serialize-node = impossible de sérialiser le noeud : le noeud n'a pas pu être sérialisé.
