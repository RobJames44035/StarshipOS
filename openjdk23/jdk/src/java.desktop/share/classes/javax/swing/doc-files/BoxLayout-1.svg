<svg width="160" height="160"
     version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
    <style><![CDATA[
        rect {
            fill: none;
            stroke: black;
            stroke-width: 1;
        }
        text {
            font: 16px 'DejaVu Sans', sans-serif;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        text.left {
            text-anchor: start;
            dominant-baseline: auto;
        }
    ]]></style>

    <rect x="8.5" y="8.5"
          width="144" height="144"/>
    <text x="16" y="24" class="left">P1</text>
    <g id="leftBox">
        <rect x="16.5" y="28.5"
              width="56" height="116"/>

        <rect x="24.5" y="36.5"
              width="40" height="28"/>
        <rect x="24.5" y="72.5"
              width="40" height="28"/>
        <rect x="24.5" y="108.5"
              width="40" height="28"/>
    </g>

    <text x="44" y="50">C1</text>
    <text x="44" y="86">C2</text>
    <text x="44" y="122">C3</text>

    <use xlink:href="#leftBox" x="72" y="0"/>
    <text x="86" y="24" class="left">P2</text>
    <text x="116" y="50">C4</text>
    <text x="116" y="86">C5</text>
    <text x="116" y="122">C6</text>

</svg>
